<div class="admin-page-form">
  <div class="page-header">
    <h2>➕ Thêm giới tính</h2>
    <a routerLink="/admin/gender-list" class="btn-back">← Quay lại</a>
  </div>

  <form (ngSubmit)="onSubmit()" [formGroup]="genderForm" class="admin-form">

    <div class="form-section">
      <h3>Thông tin cơ bản</h3>

      <div class="form-group">
        <label for="name">Tên giới tính <span class="required">*</span></label>
        <input
          type="text"
          id="name"
          formControlName="name"
          placeholder="Nhập tên giới tính"
          [class.error]="genderForm.get('name')?.invalid && genderForm.get('name')?.touched"
        />
        <span *ngIf="genderForm.get('name')?.errors?.['minlength'] && genderForm.get('name')?.touched" class="error-message-text">
          Tên giới tính không được để trống.
        </span>
        <span *ngIf="genderForm.get('name')?.errors?.['required'] && genderForm.get('name')?.touched" class="error-message-text">
          Tên giới tính không được để trống.
        </span>
      </div>
    </div>

    <div class="form-actions">
      <a routerLink="/admin/gender-list" class="btn-cancel">Hủy</a>
      <button type="submit" class="btn-submit" [disabled]="genderForm.invalid || isLoading">
        {{ isLoading ? 'Đang thêm...' : '✓ Thêm giới tính' }}
      </button>
    </div>
  </form>
</div>
