<div class="admin-page">
  <div class="page-header">
    <div class="header-left">
      <h2>👥 Quản lý giới tính</h2>
      <div class="search-box">
        <input
          type="text"
          placeholder="Tìm kiếm giới tính..."
          [(ngModel)]="keyword"
          (ngModelChange)="onSearch()"
          (keyup.enter)="onSearch()"
        />
      </div>
    </div>
    <a routerLink="/admin/gender-add" class="btn-add">+ Thêm giới tính mới</a>
  </div>

  <!-- Gender Table -->
  <div class="table-container">
    <table class="admin-table">
      <thead>
        <tr>
          <th>STT</th>
          <th>Tên giới tính</th>
          <th>Hành động</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let gender of filteredGenders | paginate: { itemsPerPage: 20, currentPage: p }; index as i">
          <td>{{ i + 1 }}</td>
          <td><strong>{{ gender.name }}</strong></td>
          <td class="actions-cell">
            <a
              [routerLink]="['/admin/gender-edit/', gender._id]"
              class="btn-action btn-edit"
              title="Chỉnh sửa">✏️</a>
            <button
              (click)="onDelete(gender._id)"
              class="btn-action btn-delete"
              title="Xóa">🗑️</button>
          </td>
        </tr>
        <tr *ngIf="filteredGenders.length === 0">
          <td colspan="3" class="empty-row">
            <p>Không tìm thấy giới tính nào</p>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Stats -->
  <div class="stats" *ngIf="filteredGenders.length > 0">
    <span>Tổng: <strong>{{ filteredGenders.length }}</strong> giới tính</span>
  </div>

  <!-- Pagination -->
  <div class="pagination">
    <pagination-controls 
      (pageChange)="p = $event"
      previousLabel="Trước"
      nextLabel="Sau"
      screenReaderPaginationLabel="Phân trang"
      screenReaderPageLabel="trang"
      screenReaderCurrentLabel="Bạn đang ở trang">
    </pagination-controls>
  </div>
</div>
