<div class="admin-page-form">
  <div class="page-header">
    <h2>✏️ Sửa tin tức</h2>
    <a routerLink="/admin/news-list" class="btn-back">← Quay lại</a>
  </div>

  <!-- Loading -->
  <div class="loading" *ngIf="isLoading && !newsForm.value.title">
    <div class="spinner"></div>
    <p>Đang tải...</p>
  </div>

  <!-- Error Message -->
  <div class="error-message" *ngIf="errorMessage">
    ❌ {{ errorMessage }}
    <button class="close-btn" (click)="errorMessage = null">×</button>
  </div>

  <form [formGroup]="newsForm" (ngSubmit)="onSubmit()" class="admin-form" *ngIf="!isLoading || newsForm.value.title" enctype="multipart/form-data">
    <div class="form-sections-grid">
      <!-- Cột trái -->
      <div class="form-column">
        <div class="form-section">
          <h3>Thông tin cơ bản</h3>
          
          <div class="form-group">
            <label for="title">Tiêu đề <span class="required">*</span></label>
            <input
              type="text"
              id="title"
              formControlName="title"
              placeholder="Nhập tiêu đề tin tức"
              [class.error]="newsForm.get('title')?.invalid && newsForm.get('title')?.touched"
            />
            <span *ngIf="newsForm.get('title')?.errors?.['required'] && newsForm.get('title')?.touched" class="error-message-text">
              Tiêu đề không được để trống.
            </span>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="category_code">Danh mục <span class="required">*</span></label>
              <input
                type="text"
                id="category_code"
                formControlName="category_code"
                placeholder="Mã danh mục"
                [class.error]="newsForm.get('category_code')?.invalid && newsForm.get('category_code')?.touched"
              />
            </div>

            <div class="form-group">
              <label for="status_code">Trạng thái</label>
              <select id="status_code" formControlName="status_code">
                <option value="draft">Bản nháp</option>
                <option value="published">Đã xuất bản</option>
                <option value="hidden">Ẩn</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <!-- Cột phải -->
      <div class="form-column">
        <div class="form-section">
          <h3>Hình ảnh</h3>
          
          <div class="form-group" *ngIf="imagePreview">
            <label>Ảnh bìa hiện tại</label>
            <div class="image-preview-grid">
              <div class="image-preview-item">
                <img [src]="imagePreview" alt="Cover" />
              </div>
            </div>
          </div>

          <div class="form-group">
            <label for="cover_image_url">Thay đổi ảnh bìa (tùy chọn)</label>
            <input
              type="file"
              id="cover_image_url"
              accept="image/*"
              (change)="onFileSelected($event)"
            />
            <small class="hint">Chọn ảnh mới nếu muốn thay đổi ảnh bìa</small>
          </div>
        </div>
      </div>
    </div>

    <!-- Nội dung - Full width -->
    <div class="form-section form-section-full">
      <h3>Nội dung bài viết</h3>
      <div class="form-group">
        <label for="content">Nội dung <span class="required">*</span></label>
        <textarea
          id="content"
          formControlName="content"
          rows="15"
          placeholder="Nhập nội dung tin tức..."
          [class.error]="newsForm.get('content')?.invalid && newsForm.get('content')?.touched"
        ></textarea>
        <span *ngIf="newsForm.get('content')?.errors?.['required'] && newsForm.get('content')?.touched" class="error-message-text">
          Nội dung không được để trống.
        </span>
      </div>
    </div>

    <div class="form-actions">
      <a routerLink="/admin/news-list" class="btn-cancel">Hủy</a>
      <button type="submit" class="btn-submit" [disabled]="newsForm.invalid || isLoading">
        {{ isLoading ? 'Đang cập nhật...' : '✓ Lưu thay đổi' }}
      </button>
    </div>
  </form>
</div>
