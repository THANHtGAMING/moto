<div class="admin-page-form">
  <div class="page-header">
    <h2>➕ Thêm tay đua</h2>
    <a routerLink="/admin/rider-list" class="btn-back">← Quay lại</a>
  </div>

  <form (ngSubmit)="onSubmit()" [formGroup]="riderForm" class="admin-form" enctype="multipart/form-data">

    <div class="form-section">
      <h3>Thông tin cơ bản</h3>

      <div class="form-group">
        <label for="name">Tên tay đua <span class="required">*</span></label>
        <input
          type="text"
          id="name"
          formControlName="name"
          placeholder="Nhập tên tay đua"
          [class.error]="riderForm.get('name')?.invalid && riderForm.get('name')?.touched"
        />
        <span *ngIf="riderForm.get('name')?.errors?.['minlength'] && riderForm.get('name')?.touched" class="error-message-text">
          Tên tay đua không được để trống.
        </span>
        <span *ngIf="riderForm.get('name')?.errors?.['required'] && riderForm.get('name')?.touched" class="error-message-text">
          Tên tay đua không được để trống.
        </span>
      </div>

      <div class="form-group">
        <label for="team">Đội (tùy chọn)</label>
        <input
          type="text"
          id="team"
          formControlName="team"
          placeholder="Nhập tên đội"
        />
        <small class="hint">Tên đội mà tay đua đang thi đấu</small>
      </div>

      <div class="form-group">
        <label for="image">Ảnh tay đua <span class="required">*</span></label>
        <input
          type="file"
          id="image"
          accept="image/*"
          (change)="onFileSelected($event)"
          [class.error]="riderForm.get('image')?.invalid && riderForm.get('image')?.touched"
        />
        <span *ngIf="riderForm.get('image')?.errors?.['required'] && riderForm.get('image')?.touched" class="error-message-text">
          Vui lòng chọn ảnh tay đua.
        </span>
        <div *ngIf="imagePreview" class="image-preview-grid" style="margin-top: 15px;">
          <div class="image-preview-item">
            <img [src]="imagePreview" alt="Xem trước" />
          </div>
        </div>
      </div>
    </div>

    <div class="form-actions">
      <a routerLink="/admin/rider-list" class="btn-cancel">Hủy</a>
      <button type="submit" class="btn-submit" [disabled]="riderForm.invalid || isLoading">
        {{ isLoading ? 'Đang thêm...' : '✓ Thêm tay đua' }}
      </button>
    </div>
  </form>
</div>
