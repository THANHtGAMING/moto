<div class="admin-page-form">
  <div class="page-header">
    <h2>➕ Thêm nhãn hàng</h2>
    <a routerLink="/admin/brand-list" class="btn-back">← Quay lại</a>
  </div>

  <form [formGroup]="brandForm" (ngSubmit)="onSubmit()" class="admin-form" enctype="multipart/form-data">

    <div class="form-section">
      <h3>Thông tin cơ bản</h3>

      <div class="form-group">
        <label for="name">Tên nhãn hàng <span class="required">*</span></label>
        <input
          type="text"
          id="name"
          formControlName="name"
          placeholder="Nhập tên nhãn hàng"
          [class.error]="brandForm.get('name')?.invalid && brandForm.get('name')?.touched"
        />
        <span *ngIf="brandForm.get('name')?.errors?.['required'] && brandForm.get('name')?.touched" class="error-message-text">
          Tên nhãn hàng không được để trống.
        </span>
        <span *ngIf="brandForm.get('name')?.errors?.['minlength'] && brandForm.get('name')?.touched" class="error-message-text">
          Tên nhãn hàng phải có ít nhất 2 ký tự.
        </span>
      </div>

      <div class="form-group">
        <label for="description">Mô tả (tùy chọn)</label>
        <textarea
          id="description"
          formControlName="description"
          rows="3"
          placeholder="Mô tả về nhãn hàng"
        ></textarea>
      </div>
    </div>

    <div class="form-section">
      <h3>Logo nhãn hàng</h3>

      <div class="form-group">
        <label for="logo">Logo nhãn hàng <span class="required">*</span></label>
        <input
          type="file"
          id="logo"
          accept="image/*"
          (change)="onFileSelected($event)"
        />
        <div *ngIf="imagePreview" class="image-preview-grid" style="margin-top: 15px;">
          <div class="image-preview-item">
            <img [src]="imagePreview" alt="Xem trước" />
          </div>
        </div>
      </div>
    </div>

    <div class="form-actions">
      <a routerLink="/admin/brand-list" class="btn-cancel">Hủy</a>
      <button type="submit" class="btn-submit" [disabled]="brandForm.invalid || isLoading">
        {{ isLoading ? 'Đang thêm...' : '✓ Thêm nhãn hàng' }}
      </button>
    </div>
  </form>
</div>
